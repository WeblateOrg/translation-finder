name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        - macos-latest
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
        exclude:
        - os: windows-latest
          python-version: '3.12'
        - os: macos-latest
          python-version: '3.12'
        - os: windows-latest
          python-version: '3.13'
        - os: macos-latest
          python-version: '3.13'
    name: ${{ matrix.os }}, Python ${{ matrix.python-version }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      with:
        version: 0.11.26
    - name: Install pip dependencies
      run: uv pip install --system https://github.com/WeblateOrg/language-data/archive/main.zip -e .[dev]
    - name: Test
      run: |
        py.test --cov=translation_finder translation_finder README.rst
    - name: Coverage
      run: |
        coverage xml
    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{secrets.CODECOV_TOKEN}} # zizmor: ignore[secrets-outside-env]
        flags: unittests
        name: Python ${{ matrix.python-version }}, ${{ matrix.os }}
    - name: DeepSource
      if: matrix.os == 'ubuntu-latest'
      continue-on-error: true
      env:
        DEEPSOURCE_DSN: ${{secrets.DEEPSOURCE_DSN}} # zizmor: ignore[secrets-outside-env]
      run: |
        curl https://deepsource.io/cli | sh
        ./bin/deepsource report --analyzer test-coverage --key python --value-file ./coverage.xml
permissions:
  contents: read
